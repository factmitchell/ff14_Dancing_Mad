<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2ミッシング塔 処理シミュレーター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ff4a4a;
        }
        #controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            background: #2a2a35;
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #444454;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #55556c;
        }
        button.active {
            background: #00bcd4;
        }
        #sizeControl {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 8px 10px;
            border-radius: 8px;
            color: #fff;
        }
        #sizeControl label {
            font-size: 13px;
            white-space: nowrap;
        }
        #sizeControl input[type="range"] {
            width: 180px;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 50%;
            overflow: hidden;
            background: #111;
        }
        canvas {
            display: block;
        }
        #info-panel {
            margin-top: 15px;
            max-width: 600px;
            background: #2a2a35;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
        }
        .highlight { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <h1>P2ミッシング塔 処理シミュレーター (ベース版)</h1>

    <div id="controls">
        <button id="btn-init" class="active">初期配置</button>
        <button id="btn-odd">奇数回</button>
        <button id="btn-even">偶数回</button>
        <button id="btn-generate">デバフ生成</button>
        <button id="btn-prev-hit">前の塔</button>
        <button id="btn-next-hit">次の塔</button>
        <button id="btn-align">自動整列</button>
        <button id="btn-check">答え合わせ</button>
        <button id="btn-reset">リセット</button>
    </div>

    <div id="towerStatus" style="margin-top: 8px; max-width: 600px; background: #222; padding: 10px; border-radius: 8px; font-size: 13px; color: #fff;">塔着弾: 0 / 8</div>

    <div id="sizeControl">
        <label for="fieldSizeSlider">フィールドサイズ: <span id="sizeLabel">750</span> px</label>
        <input id="fieldSizeSlider" type="range" min="400" max="900" step="50" value="750">
    </div>

    <div id="canvas-container">
        <canvas id="fieldCanvas" width="750" height="750"></canvas>
    </div>

    <div id="info-panel">
        <strong>【簡易操作マニュアル】</strong><br>
        * マウスやタップで各ジョブのマーカーを<span class="highlight">ドラッグ＆ドロップ</span>して移動できます。<br>
        * 「デバフ生成」で先組/後組を含む状態が作成されます。<br>
        * 「前の塔」「次の塔」で塔着弾を進め、現在の担当グループのみデバフを表示します。<br>
        * 「自動整列」で優先度に基づいた左右配置を表示します。<br>
        * 「答え合わせ」で塔の判定および無職組の左右分割を簡易判定します。
    </div>

    <div id="statePanel" style="margin-top: 12px; max-width: 600px; background: #262634; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5;"></div>
    <div id="coordsPanel" style="margin-top: 10px; max-width: 600px; background: #262634; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; white-space: pre-wrap;"></div>
    <div id="logPanel" style="margin-top: 10px; max-width: 600px; background: #262634; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5;"></div>

    <script>
        const canvas = document.getElementById('fieldCanvas');
        const ctx = canvas.getContext('2d');
        const BASE_CANVAS_SIZE = 600;
        let cssSize = 750;
        const dpr = window.devicePixelRatio || 1;
        let centerX;
        let centerY;
        let radius;

        function getScaleFactor() {
            return cssSize / BASE_CANVAS_SIZE;
        }

        function s(value) {
            return value * getScaleFactor();
        }

        function scaledFont(px, weight = '') {
            const size = Math.max(8, Math.round(s(px)));
            return `${weight ? weight + ' ' : ''}${size}px Arial`;
        }

        function updateCanvasSize(size) {
            const scale = size / cssSize;
            if (cssSize !== size) {
                players.forEach(player => {
                    player.x *= scale;
                    player.y *= scale;
                });
            }
            cssSize = size;
            canvas.style.width = `${cssSize}px`;
            canvas.style.height = `${cssSize}px`;
            canvas.width = cssSize * dpr;
            canvas.height = cssSize * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            centerX = cssSize / 2;
            centerY = cssSize / 2;
            radius = cssSize / 2 - s(20);
        }

        let currentPhase = 'init';
        let draggedPlayer = null;
        let currentTowerHit = 0;
        const towerHitGroups = ['先組', '先組', '先組', '後組', '後組', '後組', '後組', '先組'];
        let towerDebuffAssignments = {
            '先組': {},
            '後組': {}
        };

        function getTowerGroupByHit(hit) {
            return towerHitGroups[hit - 1] || null;
        }

        function getGroupHitOrdinal(group, hit) {
            if (!group || hit < 1) return 0;
            return towerHitGroups.slice(0, hit).filter(g => g === group).length;
        }

        function getPlayersByGroup(group) {
            return players.filter(player => player.debuff.group === group);
        }

        function createPlayer(id, role, x, y, color) {
            return {
                id,
                role,
                x,
                y,
                color,
                debuff: { group: '', number: null, mechanic: '' },
                type: '無職',
                order: null,
                current_turn_active: false
            };
        }

        const initialPlayerState = [
            createPlayer('MT', 'TANK', 260, 260, '#4169e1'),
            createPlayer('ST', 'TANK', 340, 260, '#4169e1'),
            createPlayer('H1', 'HEALER', 220, 300, '#32cd32'),
            createPlayer('H2', 'HEALER', 380, 300, '#32cd32'),
            createPlayer('D1', 'DPS', 250, 340, '#dc143c'),
            createPlayer('D2', 'DPS', 350, 340, '#dc143c'),
            createPlayer('D3', 'DPS', 210, 380, '#dc143c'),
            createPlayer('D4', 'DPS', 390, 380, '#dc143c')
        ];

        let players = clonePlayers(initialPlayerState, getScaleFactor());
        updateCanvasSize(cssSize);
        const pairGroups = [['MT', 'H1'], ['ST', 'H2'], ['D1', 'D3'], ['D2', 'D4']];
        const pairColors = ['#ff7f50', '#7fffd4', '#ffd700', '#9370db'];
        const roleIcons = {
            TANK: new Image(),
            HEALER: new Image(),
            DPS: new Image()
        };
        let loadedRoleIcons = 0;
        const onRoleIconLoad = () => {
            loadedRoleIcons += 1;
            if (loadedRoleIcons === 3) {
                drawField();
            }
        };
        roleIcons.TANK.onload = onRoleIconLoad;
        roleIcons.HEALER.onload = onRoleIconLoad;
        roleIcons.DPS.onload = onRoleIconLoad;
        roleIcons.TANK.src = 'FFXIVIcons JobIcons/00_ROLE/TankRole.png';
        roleIcons.HEALER.src = 'FFXIVIcons JobIcons/00_ROLE/HealerRole.png';
        roleIcons.DPS.src = 'FFXIVIcons JobIcons/00_ROLE/DPSRole.png';

        function getPairColor(id) {
            const pairIndex = pairGroups.findIndex(pair => pair.includes(id));
            return pairColors[pairIndex] || '#ffffff';
        }

        function getMechanicEmoji(mechanic) {
            if (mechanic === '頭割り') return '🛡️';
            if (mechanic === '円AoE') return '⭕';
            if (mechanic === '扇AoE') return '📐';
            return '';
        }

        function clonePlayers(source, scale = 1) {
            return source.map(player => {
                const clone = JSON.parse(JSON.stringify(player));
                clone.x *= scale;
                clone.y *= scale;
                return clone;
            });
        }

        function getPlayerPriority(player) {
            if (player.role === 'TANK') return 100;
            if (player.role === 'HEALER') return 80;
            if (player.id === 'D1') return 65;
            if (player.id === 'D2') return 60;
            if (player.id === 'D3') return 55;
            if (player.id === 'D4') return 50;
            return 0;
        }

        function sortByPriority(list) {
            return [...list].sort((a, b) => getPlayerPriority(b) - getPlayerPriority(a));
        }

        function shuffle(array) {
            return array
                .map(value => ({ value, sort: Math.random() }))
                .sort((a, b) => a.sort - b.sort)
                .map(({ value }) => value);
        }

        function getPhaseTowers() {
            return [
                { id: 'tower1', type: '円', position: { x: centerX - s(80), y: centerY + s(100) }, radius: s(60), required_players: 1, label: '塔(左)', color: 'rgba(0, 150, 255, 0.4)' },
                { id: 'tower2', type: '円', position: { x: centerX + s(80), y: centerY + s(100) }, radius: s(60), required_players: 1, label: '塔(右)', color: 'rgba(255, 50, 50, 0.4)' }
            ];
        }

        function drawField() {
            ctx.clearRect(0, 0, cssSize, cssSize);

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#222';
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = s(3);
            ctx.stroke();

            ctx.strokeStyle = '#333';
            ctx.lineWidth = s(1);
            for (let r = s(50); r < radius; r += s(60)) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.beginPath(); ctx.moveTo(centerX, s(20)); ctx.lineTo(centerX, cssSize - s(20)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(s(20), centerY); ctx.lineTo(cssSize - s(20), centerY); ctx.stroke();

            ctx.fillStyle = '#aaa';
            ctx.font = scaledFont(16);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('A', centerX, s(35));
            ctx.fillText('B', cssSize - s(35), centerY);
            ctx.fillText('C', centerX, cssSize - s(35));
            ctx.fillText('D', s(35), centerY);

            drawGimmickGuides();
            drawTowerEffects(getTowerEffects());
            drawEffects(getPhaseEffects());
            updateCoordsPanel();

            players.forEach(player => {
                ctx.beginPath();
                ctx.arc(player.x, player.y, s(18), 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fill();
                ctx.strokeStyle = getPairColor(player.id);
                ctx.lineWidth = s(4);
                ctx.stroke();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = s(1.5);
                ctx.stroke();

                const iconSize = s(24);
                const iconOffset = s(12);
                const icon = roleIcons[player.role];
                if (icon.complete && icon.naturalWidth) {
                    ctx.drawImage(icon, player.x - iconOffset, player.y - iconOffset, iconSize, iconSize);
                } else {
                    ctx.fillStyle = player.color;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, s(10), 0, Math.PI * 2);
                    ctx.fill();
                }

                const emoji = getMechanicEmoji(player.debuff.mechanic || player.type);
                if (emoji) {
                    ctx.fillStyle = '#fff';
                    ctx.font = scaledFont(14);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(emoji, player.x, player.y - s(22));
                }

                const labelText = player.id;
                const labelY = player.y + s(30);
                ctx.font = scaledFont(10, 'bold');
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const labelWidth = ctx.measureText(labelText).width + s(10);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fillRect(player.x - labelWidth / 2, labelY - s(8), labelWidth, s(16));
                ctx.fillStyle = '#fff';
                ctx.fillText(labelText, player.x, labelY);
            });
        }

        function drawGimmickGuides() {
            const towers = getPhaseTowers();
            towers.forEach(tower => {
                drawTower(tower.position.x, tower.position.y, tower.radius, tower.color, tower.label);
            });
        }

        function getTowerEffects() {
            const activeGroup = getTowerGroupByHit(currentTowerHit);
            return players
                .filter(player => player.debuff.mechanic && player.debuff.group === activeGroup)
                .map(player => ({
                    type: player.debuff.mechanic,
                    source: player,
                    target: player.debuff.mechanic === '扇AoE' ? nearestPlayer(player) : null,
                    radius: player.debuff.mechanic === '円AoE' ? 45 : player.debuff.mechanic === '扇AoE' ? 90 : 50,
                    label: player.debuff.mechanic
                }));
        }

        function drawTowerEffects(effects) {
            effects.forEach(effect => {
                const radius = s(effect.radius);
                if (effect.type === '頭割り' || effect.type === '円AoE') {
                    ctx.beginPath();
                    ctx.arc(effect.source.x, effect.source.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = effect.type === '頭割り' ? 'rgba(255, 100, 100, 0.25)' : 'rgba(100, 150, 255, 0.25)';
                    ctx.fill();
                    ctx.strokeStyle = effect.type === '頭割り' ? 'rgba(255, 100, 100, 0.8)' : 'rgba(100, 150, 255, 0.8)';
                    ctx.lineWidth = s(2);
                    ctx.stroke();
                }
                if (effect.type === '扇AoE' && effect.target) {
                    const dx = effect.target.x - effect.source.x;
                    const dy = effect.target.y - effect.source.y;
                    const baseAngle = Math.atan2(dy, dx);
                    const half = Math.PI / 6;
                    ctx.beginPath();
                    ctx.moveTo(effect.source.x, effect.source.y);
                    ctx.lineTo(effect.source.x + Math.cos(baseAngle - half) * radius, effect.source.y + Math.sin(baseAngle - half) * radius);
                    ctx.arc(effect.source.x, effect.source.y, radius, baseAngle - half, baseAngle + half);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.2)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 200, 0, 0.8)';
                    ctx.lineWidth = s(2);
                    ctx.stroke();
                }
            });
        }

        function drawTower(x, y, r, color, label) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = s(1.5);
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = scaledFont(10);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x, y);
        }

        function getPhaseEffects() {
            if (currentPhase === 'init') return [];
            const headPlayers = players.filter(p => p.debuff.mechanic === '頭割り').sort((a, b) => a.order - b.order);
            const circlePlayers = players.filter(p => p.debuff.mechanic === '円AoE').sort((a, b) => a.order - b.order);
            const fanPlayers = players.filter(p => p.debuff.mechanic === '扇AoE').sort((a, b) => a.order - b.order);
            const effects = [];

            if (currentPhase === 'odd') {
                if (headPlayers[0]) effects.push({ type: 'HEAD', source: headPlayers[0], radius: 70, label: '頭割り1' });
                if (headPlayers[1]) effects.push({ type: 'HEAD', source: headPlayers[1], radius: 70, label: '頭割り2' });
                if (fanPlayers[0]) effects.push({ type: 'FAN', source: fanPlayers[0], target: nearestPlayer(fanPlayers[0]), radius: 90, angle: Math.PI / 3, label: '扇AoE' });
                if (circlePlayers[0]) effects.push({ type: 'CIRCLE', source: circlePlayers[0], radius: 45, label: '円AoE' });
            } else if (currentPhase === 'even') {
                if (fanPlayers[0]) effects.push({ type: 'FAN', source: fanPlayers[0], target: nearestPlayer(fanPlayers[0]), radius: 90, angle: Math.PI / 3, label: '扇AoE1' });
                if (fanPlayers[1]) effects.push({ type: 'FAN', source: fanPlayers[1], target: nearestPlayer(fanPlayers[1]), radius: 90, angle: Math.PI / 3, label: '扇AoE2' });
                if (circlePlayers[0]) effects.push({ type: 'CIRCLE', source: circlePlayers[0], radius: 45, label: '円AoE1' });
                if (circlePlayers[1]) effects.push({ type: 'CIRCLE', source: circlePlayers[1], radius: 45, label: '円AoE2' });
            }
            return effects;
        }

        function nearestPlayer(source) {
            let nearest = null;
            let minDist = Infinity;
            players.forEach(target => {
                if (target.id === source.id) return;
                const dist = Math.hypot(target.x - source.x, target.y - source.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = target;
                }
            });
            return nearest || source;
        }

        function fanRadiusToFieldEdge(source, angle) {
            const dx = Math.cos(angle);
            const dy = Math.sin(angle);
            const relX = source.x - centerX;
            const relY = source.y - centerY;
            const b = relX * dx + relY * dy;
            const c = relX * relX + relY * relY - radius * radius;
            const discriminant = b * b - c;
            if (discriminant <= 0) {
                return s(90);
            }
            const t = -b + Math.sqrt(discriminant);
            return t;
        }

        function drawEffects(effects) {
            effects.forEach((effect, index) => {
                const radius = s(effect.radius);
                if (effect.type === 'HEAD' || effect.type === 'CIRCLE') {
                    ctx.beginPath();
                    ctx.arc(effect.source.x, effect.source.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = effect.type === 'HEAD' ? 'rgba(255, 100, 100, 0.25)' : 'rgba(100, 150, 255, 0.25)';
                    ctx.fill();
                    ctx.strokeStyle = effect.type === 'HEAD' ? 'rgba(255, 100, 100, 0.8)' : 'rgba(100, 150, 255, 0.8)';
                    ctx.lineWidth = s(2);
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = scaledFont(10);
                    ctx.fillText(effect.label, effect.source.x, effect.source.y - radius - s(10));
                }
                if (effect.type === 'FAN' && effect.target) {
                    const dx = effect.target.x - effect.source.x;
                    const dy = effect.target.y - effect.source.y;
                    const baseAngle = Math.atan2(dy, dx);
                    const fanRadius = fanRadiusToFieldEdge(effect.source, baseAngle);
                    const half = effect.angle / 2;
                    ctx.beginPath();
                    ctx.moveTo(effect.source.x, effect.source.y);
                    ctx.lineTo(effect.source.x + Math.cos(baseAngle - half) * fanRadius, effect.source.y + Math.sin(baseAngle - half) * fanRadius);
                    ctx.arc(effect.source.x, effect.source.y, fanRadius, baseAngle - half, baseAngle + half);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.2)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 200, 0, 0.8)';
                    ctx.lineWidth = s(2);
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = scaledFont(10);
                    ctx.fillText(effect.label, effect.source.x, effect.source.y - s(10));
                    ctx.beginPath();
                    ctx.arc(effect.target.x, effect.target.y, s(5), 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                }
            });
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
        }

        canvas.addEventListener('mousedown', e => {
            const pos = getMousePos(e);
            players.forEach(player => {
                const dist = Math.hypot(player.x - pos.x, player.y - pos.y);
                if (dist < s(16)) {
                    draggedPlayer = player;
                }
            });
        });

        canvas.addEventListener('mousemove', e => {
            if (draggedPlayer) {
                const pos = getMousePos(e);
                const distFromCenter = Math.hypot(pos.x - centerX, pos.y - centerY);
                if (distFromCenter < radius) {
                    draggedPlayer.x = pos.x;
                    draggedPlayer.y = pos.y;
                }
                drawField();
            }
        });

        window.addEventListener('mouseup', () => {
            draggedPlayer = null;
        });

        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', e => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent('mouseup', {});
            window.dispatchEvent(mouseEvent);
        });

        function resetSimulation() {
            players = clonePlayers(initialPlayerState, getScaleFactor());
            players.forEach(player => {
                player.debuff = { group: '', number: null, mechanic: '' };
                player.type = '無職';
                player.order = null;
                player.current_turn_active = false;
            });
            currentTowerHit = 0;
            currentPhase = 'init';
            setPhase('init');
            updateTowerStatus();
            updateStatePanel();
            updateLog('リセットされました。デバフ生成を行ってください。');
        }

        function assignTowerGroups() {
            const pairIndices = pairGroups.map((_, idx) => idx);
            const shuffledPairs = shuffle(pairIndices);
            const firstTwo = new Set(shuffledPairs.slice(0, 2));
            players.forEach(player => {
                const pairIndex = pairGroups.findIndex(pair => pair.includes(player.id));
                const group = firstTwo.has(pairIndex) ? '先組' : '後組';
                player.debuff.group = group;
                player.type = group;
                player.current_turn_active = false;
                player.debuff.mechanic = '';
            });
        }

        function createTowerDebuffAssignment(groupPlayers, ordinal) {
            const ids = groupPlayers.map(player => player.id);
            const assignment = {};
            ids.forEach(id => assignment[id] = '');

            if (ordinal === 1) {
                const type = Math.random() < 0.5 ? '円AoE' : '扇AoE';
                const selected = shuffle(ids).slice(0, 2);
                selected.forEach(id => assignment[id] = type);
            } else if (ordinal === 2) {
                const shuffledIds = shuffle(ids);
                const headIds = shuffledIds.slice(0, 2);
                const restIds = shuffledIds.slice(2);
                headIds.forEach(id => assignment[id] = '頭割り');
                assignment[restIds[0]] = '円AoE';
                assignment[restIds[1]] = '扇AoE';
            } else if (ordinal === 3) {
                const shuffledIds = shuffle(ids);
                const headIds = shuffledIds.slice(0, 2);
                const restIds = shuffledIds.slice(2);
                const type = Math.random() < 0.5 ? '円AoE' : '扇AoE';
                headIds.forEach(id => assignment[id] = '頭割り');
                restIds.forEach(id => assignment[id] = type);
            }
            return assignment;
        }

        function generateTowerDebuffAssignments() {
            ['先組', '後組'].forEach(group => {
                const groupPlayers = getPlayersByGroup(group);
                for (let ordinal = 1; ordinal <= 4; ordinal += 1) {
                    towerDebuffAssignments[group][ordinal] = createTowerDebuffAssignment(groupPlayers, ordinal);
                }
            });
        }

        function applyTowerHitDebuffs() {
            if (currentTowerHit === 0) {
                players.forEach(player => {
                    player.debuff.mechanic = '';
                    player.current_turn_active = false;
                });
                return;
            }

            const activeGroup = getTowerGroupByHit(currentTowerHit);
            const ordinal = getGroupHitOrdinal(activeGroup, currentTowerHit);
            const assignment = towerDebuffAssignments[activeGroup][ordinal] || {};

            players.forEach(player => {
                if (player.debuff.group === activeGroup) {
                    player.debuff.mechanic = assignment[player.id] || '';
                    player.current_turn_active = !!player.debuff.mechanic;
                } else {
                    player.debuff.mechanic = '';
                    player.current_turn_active = false;
                }
            });
        }

        function updateTowerStatus() {
            const towerStatus = document.getElementById('towerStatus');
            const activeGroup = getTowerGroupByHit(currentTowerHit);
            const groupText = activeGroup ? `担当: ${activeGroup}` : '担当: なし';
            towerStatus.textContent = `塔着弾: ${currentTowerHit} / 8 (${groupText})`;
        }

        function setTowerHit(hit) {
            currentTowerHit = Math.max(0, Math.min(8, hit));
            applyTowerHitDebuffs();
            updateTowerStatus();
            updateStatePanel();
            drawField();
        }

        function changeTowerHit(delta) {
            setTowerHit(currentTowerHit + delta);
        }

        function generateDebuff() {
            players = clonePlayers(initialPlayerState, getScaleFactor());
            players.forEach(player => {
                player.debuff = { group: '', number: null, mechanic: '' };
                player.order = null;
                player.current_turn_active = false;
                player.type = '無職';
            });

            assignTowerGroups();
            generateTowerDebuffAssignments();
            const orders = shuffle([1, 2, 3, 4, 5, 6, 7, 8]);
            players.forEach((player, index) => {
                player.debuff.number = orders[index];
                player.order = orders[index];
            });

            currentTowerHit = 0;
            applyTowerHitDebuffs();
            updateTowerStatus();
            updateStatePanel();
            updateLog('デバフを生成しました。先組と後組が決まりました。塔着弾を進めてください。');
            drawField();
        }

        function getHorizontalAssignment(playersList) {
            const sorted = sortByPriority(playersList);
            return {
                left: sorted.slice(0, 2),
                right: sorted.slice(2, 4)
            };
        }

        function autoAlign() {
            const towerPlayers = players.filter(p => p.type.startsWith('塔踏み'));
            const idlePlayers = players.filter(p => p.type === '無職');
            const towers = getPhaseTowers();
            if (currentPhase === 'odd') {
                towerPlayers.forEach((player, index) => {
                    const tower = towers[index % towers.length];
                    const angle = index % 2 === 0 ? Math.PI / 4 : -Math.PI / 4;
                    player.x = tower.position.x + Math.cos(angle) * s(24);
                    player.y = tower.position.y + Math.sin(angle) * s(24);
                });
                const assigned = getHorizontalAssignment(idlePlayers);
                const leftTargets = [{ x: centerX - s(140), y: centerY - s(110) }, { x: centerX - s(100), y: centerY - s(140) }];
                const rightTargets = [{ x: centerX + s(140), y: centerY - s(110) }, { x: centerX + s(100), y: centerY - s(140) }];
                assigned.left.forEach((player, idx) => {
                    player.x = leftTargets[idx].x;
                    player.y = leftTargets[idx].y;
                });
                assigned.right.forEach((player, idx) => {
                    player.x = rightTargets[idx].x;
                    player.y = rightTargets[idx].y;
                });
            } else if (currentPhase === 'even') {
                towerPlayers.forEach((player, index) => {
                    const tower = towers[index % towers.length];
                    const angle = index % 2 === 0 ? Math.PI / 6 : -Math.PI / 6;
                    player.x = tower.position.x + Math.cos(angle) * s(22);
                    player.y = tower.position.y + Math.sin(angle) * s(22);
                });
                const assigned = getHorizontalAssignment(idlePlayers);
                const leftTargets = [{ x: centerX - s(180), y: centerY + s(20) }, { x: centerX - s(140), y: centerY - s(30) }];
                const rightTargets = [{ x: centerX + s(180), y: centerY + s(20) }, { x: centerX + s(140), y: centerY - s(30) }];
                assigned.left.forEach((player, idx) => {
                    player.x = leftTargets[idx].x;
                    player.y = leftTargets[idx].y;
                });
                assigned.right.forEach((player, idx) => {
                    player.x = rightTargets[idx].x;
                    player.y = rightTargets[idx].y;
                });
            }
            updateStatePanel();
            updateLog('自動整列を適用しました。配置を確認してください。');
            drawField();
        }

        function checkGimmickSuccess() {
            const towers = getPhaseTowers();
            const messages = [];
            let ok = true;
            towers.forEach(tower => {
                const insidePlayers = players.filter(player => isInside(player, tower.position, tower.radius));
                if (insidePlayers.length === 0) {
                    ok = false;
                    messages.push(`FAIL: ${tower.label} に誰もいません`);
                } else if (!insidePlayers.every(player => player.current_turn_active)) {
                    ok = false;
                    messages.push(`FAIL: ${tower.label} に担当外のプレイヤーがいます (${insidePlayers.map(p => p.id).join(', ')})`);
                } else {
                    messages.push(`OK: ${tower.label} に担当プレイヤー ${insidePlayers.map(p => p.id).join(', ')} がいます`);
                }
            });
            if (currentPhase === 'odd') {
                const idlePlayers = players.filter(p => p.type === '無職');
                const leftIdle = idlePlayers.filter(p => p.x < centerX);
                const rightIdle = idlePlayers.filter(p => p.x > centerX);
                if (leftIdle.length !== 2) {
                    ok = false;
                    messages.push('FAIL: 無職組の左側が2人ではありません');
                }
                if (rightIdle.length !== 2) {
                    ok = false;
                    messages.push('FAIL: 無職組の右側が2人ではありません');
                }
            }

            const effects = getPhaseEffects();
            if (effects.length === 0) {
                messages.push('INFO: エフェクトは現在のフェーズでは生成されません。');
            } else {
                effects.forEach(effect => {
                    if (effect.type === 'FAN') {
                        if (!effect.target) {
                            ok = false;
                            messages.push(`FAIL: ${effect.label} のターゲットが見つかりません`);
                        } else {
                            messages.push(`EFFECT: ${effect.label} を ${effect.source.id} → ${effect.target.id} で生成`);
                        }
                    } else {
                        messages.push(`EFFECT: ${effect.label} を ${effect.source.id} で生成`);
                    }
                });
            }

            if (ok) {
                messages.unshift('SUCCESS: 判定に成功しました。');
            } else {
                messages.unshift('FAIL: 判定に失敗しました。配置を見直してください。');
            }
            updateLog(messages.join('\n'));
        }

        function isInside(point, center, radius) {
            return Math.hypot(point.x - center.x, point.y - center.y) <= radius;
        }

        function setPhase(phase) {
            currentPhase = phase;
            Object.keys(buttons).forEach(key => {
                if (key === phase) buttons[key].classList.add('active');
                else buttons[key].classList.remove('active');
            });
            updateStatePanel();
            drawField();
        }

        function updateStatePanel() {
            const statePanel = document.getElementById('statePanel');
            const activeGroup = getTowerGroupByHit(currentTowerHit);
            let html = '<strong>現在の状態</strong><br>';
            html += `<div>フェーズ: ${currentPhase === 'init' ? '初期' : currentPhase === 'odd' ? '奇数回' : '偶数回'}</div>`;
            html += `<div>塔着弾: ${currentTowerHit} / 8 (${activeGroup ? `担当: ${activeGroup}` : '担当: なし'})</div>`;
            html += '<div style="margin-top: 8px;">';
            pairGroups.forEach((pair, pairIndex) => {
                const pairLabel = `ペア ${pairIndex + 1}`;
                html += `<div style="margin-top: 6px; color: ${pairColors[pairIndex]}; font-weight: bold;">${pairLabel}</div>`;
                pair.forEach(id => {
                    const player = players.find(p => p.id === id);
                    if (player) {
                        const color = getPairColor(player.id);
                        const emoji = getMechanicEmoji(player.debuff.mechanic || player.type);
                        html += `<span style="color: ${color}; font-weight: bold;">${player.id}</span>(${player.role}) : ${player.debuff.group || '未割当'} / ${player.debuff.number || '-'} / ${player.debuff.mechanic || player.type} ${emoji}<br>`;
                    }
                });
            });
            html += '</div>';
            statePanel.innerHTML = html;
            updateCoordsPanel();
        }

        function updateCoordsPanel() {
            const coordsPanel = document.getElementById('coordsPanel');
            let html = '<strong>座標一覧</strong><br>';
            pairGroups.forEach((pair, pairIndex) => {
                html += `<div style="margin-top: 6px; color: ${pairColors[pairIndex]}; font-weight: bold;">ペア ${pairIndex + 1}</div>`;
                pair.forEach(id => {
                    const player = players.find(p => p.id === id);
                    if (player) {
                        const color = getPairColor(player.id);
                        html += `<span style="color: ${color}; font-weight: bold;">${player.id}</span>: x=${Math.round(player.x)}, y=${Math.round(player.y)}<br>`;
                    }
                });
            });
            coordsPanel.innerHTML = html;
        }

        function updateLog(text) {
            const logPanel = document.getElementById('logPanel');
            logPanel.innerHTML = '<strong>判定結果</strong><br>' + text.replace(/\n/g, '<br>');
        }

        const buttons = {
            'init': document.getElementById('btn-init'),
            'odd': document.getElementById('btn-odd'),
            'even': document.getElementById('btn-even')
        };

        buttons['init'].addEventListener('click', () => setPhase('init'));
        buttons['odd'].addEventListener('click', () => setPhase('odd'));
        buttons['even'].addEventListener('click', () => setPhase('even'));
        document.getElementById('btn-generate').addEventListener('click', generateDebuff);
        document.getElementById('btn-prev-hit').addEventListener('click', () => changeTowerHit(-1));
        document.getElementById('btn-next-hit').addEventListener('click', () => changeTowerHit(1));
        document.getElementById('btn-align').addEventListener('click', autoAlign);
        document.getElementById('btn-check').addEventListener('click', checkGimmickSuccess);
        document.getElementById('btn-reset').addEventListener('click', resetSimulation);

        const fieldSizeSlider = document.getElementById('fieldSizeSlider');
        const sizeLabel = document.getElementById('sizeLabel');
        fieldSizeSlider.addEventListener('input', e => {
            const newSize = Number(e.target.value);
            sizeLabel.textContent = newSize;
            updateCanvasSize(newSize);
            drawField();
        });

        resetSimulation();
        drawField();
    </script>
</body>
</html>
