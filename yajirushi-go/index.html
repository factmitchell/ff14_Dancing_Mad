<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>矢印でGO</title>

<style>
body{
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#roles{
    display:flex;
    justify-content:center;
    gap:80px;
    margin:30px;
}

.role{
    border:2px solid white;
    border-radius:10px;
    width:160px;
    padding:20px;
}

.arrow{
    font-size:80px;
}

.time{
    font-size:60px;
    font-weight:bold;
}

#field{
    width:900px;
    height:600px;
    margin:auto;
    border:2px solid white;
    background:#333;
    position:relative;
    overflow:hidden;
}

#field::before{
    content: "";
    position: absolute;
    inset: 0;
    background: url("image_empty.png") center/contain no-repeat;
    opacity: 0.12;
    pointer-events: none;
}

#field::after{
    content: "";
    position: absolute;
    inset: 0;
    background: url("image_correct.png") center/contain no-repeat;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

#field.show-correct::after{
    opacity: 0.18;
}

.marker{
    position:absolute;
    transform:translate(-50%, -50%);
    font-size:60px;
    pointer-events:none;
}

#message{
    margin-top:20px;
    font-size:24px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#fff;
    color:#222;
}

button:hover{
    background:#ddd;
}
</style>
</head>
<body>

<h1>矢印でGO</h1>

<div id="roles"></div>

<div id="field"></div>

<div id="message">
クリックで矢印を配置
</div>

<label style="display:block; margin:15px auto; max-width:900px; color:#fff; font-size:18px;">
    <input id="alwaysShowImage" type="checkbox" style="margin-right:10px;">
    正解画像を表示します
</label>

<button id="retry">やり直し</button>

<script>

const arrows = ["↑","↓","←","→"];

function randomArrow(){
    return arrows[
        Math.floor(Math.random() * arrows.length)
    ];
}

const allowedArrowPairs = [
    ["↓","↓"],
    ["↑","↑"],
    ["→","→"],
    ["←","←"],
    ["←","↑"],
    ["→","↑"],
    ["↓","←"],
    ["↓","→"]
];

function randomArrowPair(){
    return allowedArrowPairs[
        Math.floor(Math.random() * allowedArrowPairs.length)
    ];
}

/* 固定秒数 */

const roles = [];

function initRoles(){
    const [arrow1, arrow2] = randomArrowPair();

    roles.length = 0;
    roles.push(
        {
            arrow: arrow1,
            time: 3
        },
        {
            arrow: arrow2,
            time: 5
        }
    );
}

initRoles();

const rolesDiv =
    document.getElementById("roles");

function drawRoles(){

    rolesDiv.innerHTML = "";

    roles.forEach((role,index)=>{

        const color =
            role.time <= 0 ? "red" : "white";

        const div =
            document.createElement("div");

        div.className = "role";

        div.innerHTML = `
            <div>役割${index + 1}</div>
            <div class="arrow">${role.arrow}</div>
            <div class="time"
                 style="color:${color}">
                ${Math.max(role.time,0)}
            </div>
        `;

        rolesDiv.appendChild(div);
    });
}

drawRoles();

/* カウントダウン */

setInterval(()=>{

    let timerReachedZero = false;

    roles.forEach(role=>{

        if(role.time > 0){
            role.time--;
            if(role.time === 0){
                timerReachedZero = true;
            }
        }

    });

    drawRoles();

    if(timerReachedZero){
        showResultImage();
    }

},1000);

/* 矢印配置 */

let nextRole = 0;

const field =
    document.getElementById("field");

const retryButton =
    document.getElementById("retry");

const message =
    document.getElementById("message");

const alwaysShowImage =
    document.getElementById("alwaysShowImage");

function showResultImage(){
    field.classList.add("show-correct");

    if(alwaysShowImage.checked){
        message.textContent = "正解画像を表示します";
    } else {
        message.textContent = "image_correct.png を表示しました";
    }
}

function hideResultImage(){
    field.classList.remove("show-correct");
}

function resetGame(){
    field.querySelectorAll(".marker").forEach(marker=>marker.remove());
    nextRole = 0;
    initRoles();
    drawRoles();
    if(alwaysShowImage.checked){
        field.classList.add("show-correct");
    } else {
        hideResultImage();
    }
    message.textContent = alwaysShowImage.checked ? "正解画像を表示します" : "クリックで矢印を配置";
}

retryButton.addEventListener("click", resetGame);

alwaysShowImage.addEventListener("change", ()=>{
    if(alwaysShowImage.checked){
        field.classList.add("show-correct");
    } else {
        field.classList.remove("show-correct");
    }
    message.textContent = alwaysShowImage.checked ? "正解画像を表示します" : "クリックで矢印を配置";
});

field.addEventListener("click",(e)=>{

    if(nextRole >= roles.length){
        return;
    }

    const rect =
        field.getBoundingClientRect();

    const marker =
        document.createElement("div");

    marker.className = "marker";

    marker.textContent =
        roles[nextRole].arrow;

    marker.style.left =
        (e.clientX - rect.left) + "px";

    marker.style.top =
        (e.clientY - rect.top) + "px";

    field.appendChild(marker);

    nextRole++;

    if(nextRole >= roles.length){
        showResultImage();
    }
});

</script>

</body>
</html>
