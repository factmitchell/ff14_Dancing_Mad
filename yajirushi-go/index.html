<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<title>矢印でGO</title>

<style>
body{
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#roles{
    display:flex;
    justify-content:center;
    gap:80px;
    margin:30px;
}

.role{
    border:2px solid white;
    border-radius:10px;
    width:160px;
    padding:20px;
}

.arrow{
    font-size:80px;
}

.time{
    font-size:60px;
    font-weight:bold;
}

#field{
    width:900px;
    height:600px;
    margin:auto;
    border:2px solid #444;
    background:#0d0d12;
    position:relative;
    overflow:hidden;
}

.arena{
    position:absolute;
    width:572px;
    height:572px;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 42% 37%, #22253a 0%, #141626 55%, #090b16 100%);
    border:2px solid rgba(130,140,180,0.4);
    box-shadow:inset 0 0 70px rgba(0,0,80,0.5), 0 0 18px rgba(0,0,60,0.4);
    pointer-events:none;
    z-index:0;
}

.tower{
    position:absolute;
    transform:translate(-50%,-50%);
    width:52px;
    height:52px;
    border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #d4824e 0%, #9e4e1a 45%, #5a2808 100%);
    border:2px solid rgba(220,140,60,0.65);
    box-shadow:0 0 10px rgba(180,70,10,0.45), inset 0 0 6px rgba(255,200,100,0.15);
    text-align:center;
    line-height:52px;
    font-size:24px;
    color:rgba(255,255,255,0.9);
    pointer-events:none;
    z-index:1;
}

.field-marker{
    position:absolute;
    transform:translate(-50%,-50%);
    width:26px;
    height:26px;
    border-radius:4px;
    box-sizing:border-box;
    border:1.5px solid transparent;
    text-align:center;
    line-height:23px;
    font-size:12px;
    font-weight:bold;
    color:#fff;
    pointer-events:none;
    z-index:2;
}

.target-marker{
    position:absolute;
    transform:translate(-50%, -50%);
    width:64px;
    height:64px;
    border-radius:50%;
    border:3px solid rgba(255,215,0,0.9);
    background:rgba(255,215,0,0.06);
    box-shadow:0 0 14px rgba(255,215,0,0.55);
    pointer-events:none;
    opacity:0;
    transition:opacity 0.3s ease;
    z-index:3;
}

#field.show-correct .target-marker{
    opacity:1;
}

.marker{
    position:absolute;
    transform:translate(-50%, -50%);
    font-size:60px;
    pointer-events:none;
    z-index:4;
}

.marker.correct{
    color:#7cfc00;
}

.marker.wrong{
    color:#ff6b6b;
}

#action-message,
#image-message{
    font-size:24px;
}

#image-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:15px auto;
    max-width:900px;
    color:#fff;
    font-size:18px;
    flex-wrap:nowrap;
    white-space:nowrap;
}

#image-controls label{
    display:flex;
    align-items:center;
    gap:10px;
    white-space:nowrap;
}

#image-message{
    display:inline-block;
    margin-top:0;
    white-space:nowrap;
}

#log{
    margin:20px auto 0;
    max-width:900px;
    color:#fff;
    font-size:18px;
    text-align:left;
    white-space:pre-wrap;
    min-height:1.6em;
}

#pattern-stats{
    margin:20px auto 0;
    max-width:900px;
    color:#fff;
    text-align:left;
}

#pattern-stats table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

#pattern-stats th,
#pattern-stats td{
    border:1px solid #fff;
    padding:8px 10px;
}

#pattern-stats th{
    background:rgba(255,255,255,0.08);
}

#pattern-stats td{
    background:rgba(255,255,255,0.05);
}

.status{
    font-size:20px;
    margin-top:10px;
    min-height:28px;
}

.status.correct{
    color:#7cfc00;
}

.status.wrong{
    color:#ff6b6b;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#fff;
    color:#222;
}

button:hover{
    background:#ddd;
}

#debug-toggle-btn{
    margin-top:20px;
    padding:6px 14px;
    font-size:13px;
    background:#333;
    color:#888;
    border:1px solid #555;
    border-radius:6px;
    cursor:pointer;
}

#debug-toggle-btn.active{
    background:#3a3a00;
    color:#ffd700;
    border-color:#ffd700;
}

#debug-panel{
    display:none;
    margin:12px auto 0;
    max-width:900px;
    background:#1a1a0d;
    border:1px solid #ffd70066;
    border-radius:8px;
    padding:12px 16px;
    font-size:13px;
    color:#ccc;
}

#debug-panel.active{
    display:block;
}

#debug-panel .debug-hint{
    margin-bottom:8px;
    color:#ffd700;
    font-weight:bold;
}

#marker-log{
    width:100%;
    height:200px;
    background:#0d0d0a;
    color:#7ec8e3;
    font-family:monospace;
    font-size:12px;
    border:1px solid #444;
    border-radius:4px;
    padding:8px;
    box-sizing:border-box;
    resize:vertical;
}

#copy-log-btn{
    margin-top:6px;
    padding:6px 14px;
    font-size:13px;
    background:#335;
    color:#7ec8e3;
    border:1px solid #7ec8e3;
    border-radius:6px;
    cursor:pointer;
}

.field-marker.debug-active{
    pointer-events:all !important;
    cursor:grab;
    outline:2px dashed #ffd700;
    outline-offset:3px;
    z-index:10;
}

.field-marker.debug-active:active{
    cursor:grabbing;
}
</style>
</head>
<body>

<h1>矢印でGO</h1>

<div id="roles"></div>

<div id="field"></div>

<button id="retry">やり直し</button>

<div id="image-controls">
    <label>
        <input id="alwaysShowImage" type="checkbox">
        正解画像を表示します
    </label>
    <div id="image-message"></div>
</div>

<div id="pattern-stats">
    <div style="display:flex; gap:10px; align-items:center; justify-content:center; margin-bottom:10px;">
        <span>パターン表</span>
        <button id="enable-all-patterns">全部オン</button>
        <button id="disable-all-patterns">全部オフ</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>選択</th>
                <th>No.</th>
                <th>パターン</th>
                <th>出題回数</th>
                <th>正解</th>
                <th>正解率</th>
            </tr>
        </thead>
        <tbody id="pattern-stats-body"></tbody>
    </table>
</div>

<div id="action-message">
クリックで矢印を配置
</div>

<div id="log"></div>

<button id="debug-toggle-btn">デバッグ: OFF</button>

<div id="debug-panel">
    <div class="debug-hint">🔧 フィールドマーカーをドラッグして位置を調整してください</div>
    <textarea id="marker-log" readonly></textarea>
    <button id="copy-log-btn">コードをコピー</button>
</div>

<script>

const arrows = ["↑","↓","←","→"];

function randomArrow(){
    return arrows[
        Math.floor(Math.random() * arrows.length)
    ];
}

// 対称基準: 中心(450,300) / 左列x=261,右列x=365 / 上行y=107,下行y=205
// 鏡像: 右グループx=900-左グループx / 下グループy=600-上グループy
const allowedArrowPairs = [
    {
        arrows: ["↓","↓"],
        targets: [
            { x: 261, y: 107 },
            { x: 261, y: 205 }
        ]
    },
    {
        arrows: ["↑","↑"],
        targets: [
            { x: 639, y: 493 },
            { x: 639, y: 395 }
        ]
    },
    {
        arrows: ["→","→"],
        targets: [
            { x: 261, y: 493 },
            { x: 365, y: 493 }
        ]
    },
    {
        arrows: ["←","←"],
        targets: [
            { x: 535, y: 107 },
            { x: 639, y: 107 }
        ]
    },
    {
        arrows: ["←","↑"],
        targets: [
            { x: 365, y: 107 },
            { x: 365, y: 205 }
        ]
    },
    {
        arrows: ["↑","←"],
        targets: [
            { x: 365, y: 205 },
            { x: 365, y: 107 }
        ]
    },
    {
        arrows: ["→","↑"],
        targets: [
            { x: 535, y: 205 },
            { x: 639, y: 205 }
        ]
    },
    {
        arrows: ["↑","→"],
        targets: [
            { x: 639, y: 205 },
            { x: 535, y: 205 }
        ]
    },
    {
        arrows: ["↓","←"],
        targets: [
            { x: 261, y: 395 },
            { x: 365, y: 395 }
        ]
    },
    {
        arrows: ["←","↓"],
        targets: [
            { x: 365, y: 395 },
            { x: 261, y: 395 }
        ]
    },
    {
        arrows: ["↓","→"],
        targets: [
            { x: 535, y: 395 },
            { x: 535, y: 493 }
        ]
    },
    {
        arrows: ["→","↓"],
        targets: [
            { x: 535, y: 493 },
            { x: 535, y: 395 }
        ]
    }
];

let nextAllowedArrowPairIndex = 0;
const arrowOrder = {
    "↑": 0,
    "→": 1,
    "↓": 2,
    "←": 3
};
const patternStats = {};
const enabledPatterns = {};
let currentPatternKey = "";
let currentPatternLabel = "";
let roundRecorded = false;

function getPatternKey(arrows){
    return arrows
        .slice()
        .sort((a,b)=> arrowOrder[a] - arrowOrder[b])
        .join("");
}

function getPatternLabel(arrows){
    return arrows
        .slice()
        .sort((a,b)=> arrowOrder[a] - arrowOrder[b])
        .join(" ");
}

function ensurePatternStats(key, label){
    if(!patternStats[key]){
        patternStats[key] = {
            label,
            attempts: 0,
            wins: 0
        };
    }
}

function initializePatternStats(){
    allowedArrowPairs.forEach(pair => {
        const key = getPatternKey(pair.arrows);
        const label = getPatternLabel(pair.arrows);
        ensurePatternStats(key, label);
        enabledPatterns[key] = true;
    });
}

const patternOrder = [
    { key: "↓↓", label: "↓ ↓" },
    { key: "↑↑", label: "↑ ↑" },
    { key: "→→", label: "→ →" },
    { key: "←←", label: "← ←" },
    { key: "→↓", label: "↓ →" },
    { key: "↓←", label: "↓ ←" },
    { key: "↑←", label: "↑ →" },
    { key: "↑→", label: "↑ ←" },
];

function nextArrowPair(){
    const enabledPairs = allowedArrowPairs.filter(pair =>
        enabledPatterns[getPatternKey(pair.arrows)]
    );
    if(enabledPairs.length === 0){
        currentPatternKey = "";
        currentPatternLabel = "";
        return null;
    }
    const pair = enabledPairs[
        Math.floor(Math.random() * enabledPairs.length)
    ];
    currentPatternKey = getPatternKey(pair.arrows);
    currentPatternLabel = getPatternLabel(pair.arrows);
    roundRecorded = false;
    return pair;
}

function isMatchingTarget(role, tx, ty){
    if(role.x === null || role.y === null){
        return false;
    }
    const dx = role.x - tx;
    const dy = role.y - ty;
    return Math.hypot(dx, dy) <= role.tolerance;
}

function isCorrectPlacement(role, index){
    if(role.x === null || role.y === null){
        return false;
    }

    const other = roles[index === 0 ? 1 : 0];
    const sameArrowPair = other && role.arrow === other.arrow;

    if(sameArrowPair){
        if(other.x !== null && other.y !== null){
            const directMatch =
                isMatchingTarget(role, role.targetX, role.targetY) &&
                isMatchingTarget(other, other.targetX, other.targetY);
            const swappedMatch =
                isMatchingTarget(role, other.targetX, other.targetY) &&
                isMatchingTarget(other, role.targetX, role.targetY);
            return directMatch || swappedMatch;
        }
        return (
            isMatchingTarget(role, role.targetX, role.targetY) ||
            isMatchingTarget(role, other.targetX, other.targetY)
        );
    }

    return isMatchingTarget(role, role.targetX, role.targetY);
}

function recordPatternResult(){
    if(roundRecorded || !currentPatternKey){
        return;
    }

    const allCorrect = roles.every((role,index)=> isCorrectPlacement(role, index));
    ensurePatternStats(currentPatternKey, currentPatternLabel);
    const stats = patternStats[currentPatternKey];
    stats.attempts += 1;
    if(allCorrect){
        stats.wins += 1;
    }
    roundRecorded = true;
}

/* 固定秒数 */

// 対称グリッド: UL(261/365, 107/205) / UR(535/639, 107/205)
//               LL(261/365, 395/493) / LR(535/639, 395/493)
const towerData = [
    // 左上グループ (UL)
    { x: 261, y: 107, arrow: "↓" },
    { x: 365, y: 107, arrow: "←" },
    { x: 261, y: 205, arrow: "↓" },
    { x: 365, y: 205, arrow: "↑" },
    // 右上グループ (UR) — ULをx=450で鏡像
    { x: 535, y: 107, arrow: "←" },
    { x: 639, y: 107, arrow: "←" },
    { x: 535, y: 205, arrow: "→" },
    { x: 639, y: 205, arrow: "↑" },
    // 左下グループ (LL) — ULをy=300で鏡像
    { x: 261, y: 395, arrow: "↓" },
    { x: 365, y: 395, arrow: "←" },
    { x: 261, y: 493, arrow: "→" },
    { x: 365, y: 493, arrow: "→" },
    // 右下グループ (LR) — URをy=300で鏡像
    { x: 535, y: 395, arrow: "↓" },
    { x: 639, y: 395, arrow: "↑" },
    { x: 535, y: 493, arrow: "→" },
    { x: 639, y: 493, arrow: "↑" },
];

// 対称配置: A/C=x軸対称(y:73↔527), B/D=x=450対称(666↔234,y=300)
//           1/2=左右対称(363↔537,y=210), 3/4=1/2をy=300鏡像(y=390)
const fieldMarkerData = [
    { x: 450, y:  73, label: "A", color: "#ff6090", bg: "rgba(255,60,100,0.35)" },
    { x: 537, y: 210, label: "2", color: "#ffd700", bg: "rgba(255,210,0,0.35)" },
    { x: 666, y: 300, label: "B", color: "#ffa040", bg: "rgba(255,150,30,0.35)" },
    { x: 537, y: 390, label: "3", color: "#40c8ff", bg: "rgba(0,180,255,0.35)" },
    { x: 450, y: 527, label: "C", color: "#40c8ff", bg: "rgba(0,180,255,0.35)" },
    { x: 363, y: 390, label: "4", color: "#c080ff", bg: "rgba(160,80,255,0.35)" },
    { x: 234, y: 300, label: "D", color: "#c080ff", bg: "rgba(160,80,255,0.35)" },
    { x: 363, y: 210, label: "1", color: "#d0d0d0", bg: "rgba(200,200,200,0.35)" },
];

function initStaticField(){
    const f = document.getElementById("field");

    const arena = document.createElement("div");
    arena.className = "arena";
    f.appendChild(arena);

    towerData.forEach(t => {
        const el = document.createElement("div");
        el.className = "tower";
        el.style.left = t.x + "px";
        el.style.top  = t.y + "px";
        el.dataset.arrow = t.arrow;
        el.textContent = "";
        f.appendChild(el);
    });

    fieldMarkerData.forEach(m => {
        const el = document.createElement("div");
        el.className = "field-marker";
        el.style.left = m.x + "px";
        el.style.top  = m.y + "px";
        el.style.backgroundColor = "rgba(5,5,12,0.88)";
        el.style.border = `1.5px solid ${m.color}`;
        el.style.color = m.color;
        el.style.boxShadow = `0 0 8px ${m.color}cc, 0 0 16px ${m.color}66`;
        el.textContent = m.label;
        f.appendChild(el);
    });
}

const roles = [];

initializePatternStats();

function initRoles(){
    const pair = nextArrowPair();

    roles.length = 0;
    document.getElementById("field").querySelectorAll(".target-marker").forEach(m => m.remove());
    if(!pair){
        return;
    }

    const times = Math.random() < 0.5 ? [3, 5] : [5, 3];
    roles.push(
        {
            arrow: pair.arrows[0],
            time: times[0],
            x: null,
            y: null,
            targetX: pair.targets[0].x,
            targetY: pair.targets[0].y,
            tolerance: 25
        },
        {
            arrow: pair.arrows[1],
            time: times[1],
            x: null,
            y: null,
            targetX: pair.targets[1].x,
            targetY: pair.targets[1].y,
            tolerance: 25
        }
    );

    const fieldEl = document.getElementById("field");
    roles.forEach(role => {
        const marker = document.createElement("div");
        marker.className = "target-marker";
        marker.style.left = role.targetX + "px";
        marker.style.top  = role.targetY + "px";
        fieldEl.appendChild(marker);
    });
}

initRoles();

const rolesDiv =
    document.getElementById("roles");

function drawRoles(){

    rolesDiv.innerHTML = "";

    roles.forEach((role,index)=>{

        const color =
            role.time <= 0 ? "red" : "white";

        const isCorrect =
            role.x !== null && role.y !== null &&
            isCorrectPlacement(role, index);
        const statusText =
            role.x !== null && role.y !== null ?
            (isCorrect ? "正解" : "不正解") :
            "";
        const statusClass =
            `status${statusText ? ` ${isCorrect ? "correct" : "wrong"}` : ""}`;

        const div =
            document.createElement("div");

        div.className = "role";

        div.innerHTML = `
            <div>役割${index + 1}</div>
            <div class="arrow">${role.arrow}</div>
            <div class="time"
                 style="color:${color}">
                ${Math.max(role.time,0)}
            </div>
            <div class="${statusClass}">${statusText}</div>
        `;

        rolesDiv.appendChild(div);
    });
}

const logDiv = document.getElementById("log");

function updateLog(){
    const logLines = roles.map((role,index)=>{
        const actual = role.x !== null && role.y !== null ?
            `(${Math.round(role.x)}, ${Math.round(role.y)})` :
            "未配置";
        const target = `(${role.targetX}, ${role.targetY})`;
        const dx = role.x !== null && role.y !== null ?
            role.x - role.targetX :
            null;
        const dy = role.x !== null && role.y !== null ?
            role.y - role.targetY :
            null;
        const distance = dx !== null && dy !== null ?
            Math.hypot(dx, dy) :
            null;
        const error = dx !== null && dy !== null ?
            `誤差: ${Math.round(dx)}, ${Math.round(dy)} (${distance.toFixed(1)} <= ${role.tolerance})` :
            "誤差: 未計測";
        const result = role.x !== null && role.y !== null ?
            (isCorrectPlacement(role, index) ? "正解" : "不正解") :
            "未配置";
        return `役割${index + 1}: ${role.arrow} - 実績 ${actual} - 目標 ${target} - ${error} - ${result}`;
    });

    logDiv.textContent = logLines.join("\n");
    updatePatternTable();
}

function updatePatternTable(){
    const tbody = document.getElementById("pattern-stats-body");
    tbody.innerHTML = "";

    patternOrder.forEach((order, index) => {
        const stat = patternStats[order.key] || {
            attempts: 0,
            wins: 0
        };
        const rate = stat.attempts > 0 ?
            Math.round(stat.wins / stat.attempts * 100) :
            0;
        const row = document.createElement("tr");
        const checked = enabledPatterns[order.key] ? "checked" : "";
        row.innerHTML = `
            <td><input type="checkbox" data-pattern-key="${order.key}" ${checked}></td>
            <td>${index + 1}</td>
            <td>${order.label}</td>
            <td>${stat.attempts}</td>
            <td>${stat.wins}</td>
            <td>${rate}%</td>
        `;
        tbody.appendChild(row);
    });

    tbody.querySelectorAll("input[type=checkbox]").forEach(input => {
        input.addEventListener("change", () => {
            const key = input.dataset.patternKey;
            enabledPatterns[key] = input.checked;
            if(!Object.values(enabledPatterns).some(Boolean)){
                actionMessage.textContent = "パターンを1つ以上選択してください";
            } else {
                actionMessage.textContent = "クリックで矢印を配置";
            }
        });
    });
}

function setAllPatterns(enabled){
    Object.keys(enabledPatterns).forEach(key => {
        enabledPatterns[key] = enabled;
    });
    updatePatternTable();
    actionMessage.textContent = enabled ? "クリックで矢印を配置" : "パターンを1つ以上選択してください";
}

drawRoles();
updateLog();

/* カウントダウン */

setInterval(()=>{

    roles.forEach(role=>{

        if(role.time > 0){
            role.time--;
        }

    });

    drawRoles();

    const allTimedOut = roles.every(role => role.time <= 0);
    if(allTimedOut){
        showResultImage();
    }

},1000);

/* 矢印配置 */

const field =
    document.getElementById("field");

initStaticField();

const retryButton =
    document.getElementById("retry");

function getNextRoleIndex(){
    const unassigned = roles
        .map((role,index)=>({ role, index }))
        .filter(({ role }) => role.x === null);
    if(unassigned.length === 0) return null;
    unassigned.sort((a,b) => {
        const diff = a.role.time - b.role.time;
        return diff !== 0 ? diff : a.index - b.index;
    });
    return unassigned[0].index;
}

const actionMessage =
    document.getElementById("action-message");

const imageMessage =
    document.getElementById("image-message");

const enableAllButton =
    document.getElementById("enable-all-patterns");

const disableAllButton =
    document.getElementById("disable-all-patterns");

const alwaysShowImage =
    document.getElementById("alwaysShowImage");

enableAllButton.addEventListener("click", () => setAllPatterns(true));
disableAllButton.addEventListener("click", () => setAllPatterns(false));

/* ── タワー矢印表示制御 ─────────────────────────────────────── */

let resultShown    = false;
let lastResultCorrect = false;

function updateArrowVisibility(){
    const towers = field.querySelectorAll(".tower");
    if(alwaysShowImage.checked){
        // チェックON: 全タワーに矢印を表示
        towers.forEach(el => el.textContent = el.dataset.arrow);
        return;
    }
    // デフォルト: 全タワーの矢印を非表示
    towers.forEach(el => el.textContent = "");
    // 失敗時のみ: 正解ターゲット位置のタワーに矢印を表示
    if(resultShown && !lastResultCorrect){
        roles.forEach(role => {
            towers.forEach(el => {
                const d = Math.hypot(
                    parseFloat(el.style.left) - role.targetX,
                    parseFloat(el.style.top)  - role.targetY
                );
                if(d <= 5) el.textContent = el.dataset.arrow;
            });
        });
    }
}

function showResultImage(){
    field.classList.add("show-correct");
    resultShown = true;
    lastResultCorrect = roles.every((role, index) => isCorrectPlacement(role, index));
    recordPatternResult();
    updateLog();
    updateArrowVisibility();

    if(alwaysShowImage.checked){
        imageMessage.textContent = "常に正解画像を表示します";
    } else {
        imageMessage.textContent = "正解画像を表示";
    }
}

function hideResultImage(){
    field.classList.remove("show-correct");
}

function resetGame(){
    field.querySelectorAll(".marker").forEach(marker=>marker.remove());
    nextRole = 0;
    resultShown = false;
    lastResultCorrect = false;
    initRoles();
    drawRoles();
    updateLog();
    if(alwaysShowImage.checked){
        field.classList.add("show-correct");
    } else {
        hideResultImage();
    }
    updateArrowVisibility();
    actionMessage.textContent = "クリックで矢印を配置";
    imageMessage.textContent = alwaysShowImage.checked ? "常に正解画像を表示します" : "";
}

retryButton.addEventListener("click", resetGame);

alwaysShowImage.addEventListener("change", ()=>{
    if(alwaysShowImage.checked){
        field.classList.add("show-correct");
    } else {
        field.classList.remove("show-correct");
    }
    updateArrowVisibility();
    imageMessage.textContent = alwaysShowImage.checked ? "常に正解画像を表示します" : "正解画像を表示";
});

updateArrowVisibility();

field.addEventListener("click",(e)=>{

    if(debugMode) return;

    const roleIndex = getNextRoleIndex();
    if(roleIndex === null){
        return;
    }

    const rect =
        field.getBoundingClientRect();

    const marker =
        document.createElement("div");

    marker.className = "marker";

    marker.textContent =
        roles[roleIndex].arrow;

    marker.style.left =
        (e.clientX - rect.left) + "px";

    marker.style.top =
        (e.clientY - rect.top) + "px";

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    roles[roleIndex].x = x;
    roles[roleIndex].y = y;

    const correct = isCorrectPlacement(roles[roleIndex], roleIndex);
    marker.className = `marker ${correct ? "correct" : "wrong"}`;
    field.appendChild(marker);

    drawRoles();
    updateLog();

    const allAssigned = roles.every(role => role.x !== null);
    if(allAssigned){
        showResultImage();
    }
});

/* ── デバッグ機能 ───────────────────────────────────────────── */

let debugMode = false;
let debugDragTarget = null;
let debugDragOX = 0;
let debugDragOY = 0;

function updateMarkerLog(){
    const els = field.querySelectorAll(".field-marker");
    const lines = ["const fieldMarkerData = ["];
    els.forEach(el => {
        const label = el.textContent.trim();
        const x = Math.round(parseFloat(el.style.left));
        const y = Math.round(parseFloat(el.style.top));
        const src = fieldMarkerData.find(d => d.label === label) || {};
        lines.push(
            `    { x: ${String(x).padStart(3)}, y: ${String(y).padStart(3)},` +
            ` label: "${label}", color: "${src.color || ""}", bg: "${src.bg || ""}" },`
        );
    });
    lines.push("];");
    document.getElementById("marker-log").value = lines.join("\n");
}

function toggleDebug(){
    debugMode = !debugMode;
    const btn   = document.getElementById("debug-toggle-btn");
    const panel = document.getElementById("debug-panel");

    btn.textContent = debugMode ? "デバッグ: ON" : "デバッグ: OFF";
    btn.classList.toggle("active", debugMode);
    panel.classList.toggle("active", debugMode);

    field.querySelectorAll(".field-marker").forEach(el => {
        el.classList.toggle("debug-active", debugMode);
    });

    if(debugMode) updateMarkerLog();
}

document.getElementById("debug-toggle-btn").addEventListener("click", toggleDebug);

document.getElementById("copy-log-btn").addEventListener("click", () => {
    const ta = document.getElementById("marker-log");
    ta.select();
    document.execCommand("copy");
    const btn = document.getElementById("copy-log-btn");
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = "コードをコピー"; }, 1500);
});

field.addEventListener("mousedown", e => {
    if(!debugMode) return;
    const marker = e.target.closest(".field-marker");
    if(!marker) return;
    e.stopPropagation();
    e.preventDefault();
    debugDragTarget = marker;
    const rect = field.getBoundingClientRect();
    debugDragOX = e.clientX - rect.left - parseFloat(marker.style.left);
    debugDragOY = e.clientY - rect.top  - parseFloat(marker.style.top);
});

document.addEventListener("mousemove", e => {
    if(!debugDragTarget) return;
    const rect = field.getBoundingClientRect();
    debugDragTarget.style.left = Math.round(e.clientX - rect.left - debugDragOX) + "px";
    debugDragTarget.style.top  = Math.round(e.clientY - rect.top  - debugDragOY) + "px";
    updateMarkerLog();
});

document.addEventListener("mouseup", () => {
    debugDragTarget = null;
});

</script>
