<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>矢印でGO</title>

<style>
body{
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#roles{
    display:flex;
    justify-content:center;
    gap:80px;
    margin:30px;
}

.role{
    border:2px solid white;
    border-radius:10px;
    width:160px;
    padding:20px;
}

.arrow{
    font-size:80px;
}

.time{
    font-size:60px;
    font-weight:bold;
}

#field{
    width:900px;
    height:600px;
    margin:auto;
    border:2px solid white;
    background:#333;
    position:relative;
}

.marker{
    position:absolute;
    transform:translate(-50%, -50%);
    font-size:60px;
    pointer-events:none;
}

#message{
    margin-top:20px;
    font-size:24px;
}
</style>
</head>
<body>

<h1>矢印でGO</h1>

<div id="roles"></div>

<div id="field"></div>

<div id="message">
クリックで矢印を配置
</div>

<script>

const arrows = ["↑","↓","←","→"];

function randomArrow(){
    return arrows[
        Math.floor(Math.random() * arrows.length)
    ];
}

const allowedArrowPairs = [
    ["↓","↓"],
    ["↑","↑"],
    ["→","→"],
    ["←","←"],
    ["←","↑"],
    ["→","↑"],
    ["↓","←"],
    ["↓","→"]
];

function randomArrowPair(){
    return allowedArrowPairs[
        Math.floor(Math.random() * allowedArrowPairs.length)
    ];
}

/* 固定秒数 */

const [arrow1, arrow2] = randomArrowPair();

const roles = [
    {
        arrow: arrow1,
        time: 3
    },
    {
        arrow: arrow2,
        time: 5
    }
];

const rolesDiv =
    document.getElementById("roles");

function drawRoles(){

    rolesDiv.innerHTML = "";

    roles.forEach((role,index)=>{

        const color =
            role.time <= 0 ? "red" : "white";

        const div =
            document.createElement("div");

        div.className = "role";

        div.innerHTML = `
            <div>役割${index + 1}</div>
            <div class="arrow">${role.arrow}</div>
            <div class="time"
                 style="color:${color}">
                ${Math.max(role.time,0)}
            </div>
        `;

        rolesDiv.appendChild(div);
    });
}

drawRoles();

/* カウントダウン */

setInterval(()=>{

    roles.forEach(role=>{

        if(role.time > 0){
            role.time--;
        }

    });

    drawRoles();

},1000);

/* 矢印配置 */

let nextRole = 0;

const field =
    document.getElementById("field");

field.addEventListener("click",(e)=>{

    if(nextRole >= roles.length){
        return;
    }

    const rect =
        field.getBoundingClientRect();

    const marker =
        document.createElement("div");

    marker.className = "marker";

    marker.textContent =
        roles[nextRole].arrow;

    marker.style.left =
        (e.clientX - rect.left) + "px";

    marker.style.top =
        (e.clientY - rect.top) + "px";

    field.appendChild(marker);

    nextRole++;
});

</script>

</body>
</html>
